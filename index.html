<style>

.nav-btn{flex:1;padding:8px 0 7px;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:9px;font-weight:500;font-family:'DM Sans',sans-serif;color:#383838;transition:color .2s;letter-spacing:.3px}

.profile-screen{position:fixed;inset:0;background:#0D0B14;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;max-width:480px;margin:0 auto;overflow-y:auto}
.profile-card{background:rgba(22,18,34,.98);border:1px solid rgba(201,168,76,.25);border-radius:16px;padding:20px;width:100%;margin-bottom:10px;cursor:pointer;display:flex;align-items:center;gap:14px;transition:border-color .2s}
.profile-card:hover{border-color:rgba(201,168,76,.5)}
.profile-avatar{width:44px;height:44px;border-radius:50%;background:rgba(201,168,76,.15);border:1px solid rgba(201,168,76,.3);display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-size:18px;font-weight:700;color:#C9A84C;flex-shrink:0}

.gold-input:focus{border-color:rgba(201,168,76,.6)}
.gold-input::placeholder{color:#444}
.gold-btn{background:linear-gradient(135deg,#7a5a10,#C9A84C);border:none;border-radius:10px;padding:12px;color:#1a0e00;font-weight:700;font-size:14px;cursor:pointer;width:100%;font-family:'DM Sans',sans-serif}
.bar-wrap{display:flex;align-items:flex-end;gap:5px;height:90px;padding:0 4px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.bar{border-radius:3px 3px 0 0;width:100%;background:rgba(201,168,76,.3);min-height:2px;transition:height .5s ease}
.bar.active{background:linear-gradient(180deg,#F0D070,#C9A84C)}
.bar-lbl{font-size:9px;color:#444;text-align:center}
.bar-val{font-size:8px;color:#666;text-align:center;min-height:10px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin:4px 0}
.cal-dot{width:100%;aspect-ratio:1;border-radius:3px;background:rgba(255,255,255,.04)}
.cal-dot.active{background:rgba(201,168,76,.45)}
.cal-dot.today{border:1px solid rgba(201,168,76,.8)}
.ci-ref-row{display:flex;gap:8px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);align-items:flex-start}
.ci-ref-row:last-child{border-bottom:none}
.ci-badge{background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.3);border-radius:5px;padding:2px 7px;font-family:'Cinzel',serif;font-size:10px;font-weight:700;color:#C9A84C;flex-shrink:0;width:44px;text-align:center}
.page-title{font-family:'Cinzel',serif;font-size:14px;color:#C9A84C;margin-bottom:2px}
.page-sub{font-size:11px;color:#444;margin-bottom:12px}
.empty{text-align:center;padding:40px 16px;color:#383838;font-size:12px;line-height:1.9}
.ci-big{font-family:'Cinzel',serif;font-size:28px;font-weight:900;color:#C9A84C;line-height:1}
.xp-row{display:flex;justify-content:space-between;font-size:10px;color:#444;margin-bottom:3px}
.totals-row{margin-top:9px;padding:7px 10px;background:rgba(201,168,76,.05);border-radius:7px;display:flex;justify-content:space-between;align-items:center;font-size:11px}
.live-banner{background:rgba(34,168,90,.08);border:1px solid rgba(34,168,90,.25);border-radius:9px;padding:10px 12px;margin-bottom:9px;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.live-dot{width:7px;height:7px;border-radius:50%;background:#22a85a;animation:blink 1.2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.goal-num-input{background:rgba(255,255,255,.05);border:1px solid rgba(201,168,76,.3);border-radius:7px;padding:5px 9px;color:#C9A84C;font-size:14px;font-weight:700;width:56px;outline:none;text-align:center;font-family:'Cinzel',serif}
.del-btn{background:rgba(200,50,50,.1);border:1px solid rgba(200,50,50,.2);border-radius:6px;padding:3px 8px;color:#c03232;font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif;flex-shrink:0}

</style>

<body>
<div id="root"></div>
<div class="notif" id="notif" style="display:none"></div>

<script>
const XP_TABLE=[0,100,300,650,1200,2000,3100,4600,6600,9300,12800];
const LEVELS=[
  {rank:'Neophyte',title:'The Awakening',ci:'CI-0',desc:'The journey begins. No coverage while flaccid.'},
  {rank:'Initiate',title:'First Light',ci:'CI-1',desc:'Skin covers less than half the glans while flaccid.'},
  {rank:'Apprentice',title:'The Emerging',ci:'CI-2',desc:'Growth becomes visible. Skin covers at least half the glans while flaccid.'},
  {rank:'Journeyman',title:'The Deepening',ci:'CI-3',desc:'Skin covers the entire glans while flaccid.'},
  {rank:'Adept',title:'Half the Way',ci:'CI-4',desc:'Skin bunches up beyond the glans while flaccid.'},
  {rank:'Skilled',title:'The Turning',ci:'CI-5',desc:'Skin covers over the glans and beyond — partial rollover.'},
  {rank:'Expert',title:'The Rolling',ci:'CI-6',desc:'Skin rolls over glans easily. Coverage while erect begins.'},
  {rank:'Master',title:'Advanced',ci:'CI-7',desc:'Skin covers more than half the glans while erect.'},
  {rank:'Grand Master',title:'Near Complete',ci:'CI-8',desc:'Skin covers glans while erect with a short overhang.'},
  {rank:'Champion',title:'The Final Push',ci:'CI-9',desc:'Generous overhang covers glans completely while erect.'},
  {rank:'The Restored',title:'Journey Complete',ci:'CI-10',desc:'Full coverage flaccid and erect. Journey complete.'}
];
const CATS=[
  {id:'manual',label:'Manual',icon:'✋',mult:1.0,color:'#F59E0B',methods:['CAR 1','CAR 2','CAR 3','Manual Method (MM)','O-Pulling','Two-Point Stretch','BIB Method','Push Method','Three-Finger Pull','Cross Tug','V-Stretch','Squeeze & Pull']},
  {id:'device',label:'Devices',icon:'⚙',mult:0.8,color:'#60A5FA',methods:['DTR (Dual Tension Restorer)','TLC Tugger','HyperRestore','Foreballs','CAT II Q','Stealth Retainer','FiTness Device','PUD','Supercanister','Foreskinned','TugAhoy','Your-Skin Cone','foreGestalt']},
  {id:'tape',label:'Taping',icon:'📐',mult:0.9,color:'#A78BFA',methods:['T-Tape','3M Tegaderm','ROP Tape (Ring of Power)','Medical Tape','Kinesiology Tape','Buddy Tape']},
  {id:'special',label:'Special',icon:'⚡',mult:1.1,color:'#34D399',methods:['Mantor (Inflation)','Air Inflation','Inflation Device','Weights','Vacuum Tension','Skin Cone Retaining','Dual Inflation']}
];
const ACHS=[
  {id:'first',icon:'⚔',title:'First Step',desc:'Log first session',check:c=>c.sessions>=1},
  {id:'str3',icon:'🔥',title:'On Fire',desc:'3-day streak',check:c=>c.streak>=3},
  {id:'str7',icon:'🌟',title:'Week Warrior',desc:'7-day streak',check:c=>c.streak>=7},
  {id:'str30',icon:'👑',title:'Month Champ',desc:'30-day streak',check:c=>c.streak>=30},
  {id:'goal5',icon:'🎯',title:'Goal Getter',desc:'Hit daily goal 5 times',check:c=>c.goalDays>=5},
  {id:'goal20',icon:'💎',title:'Consistent',desc:'Hit daily goal 20 times',check:c=>c.goalDays>=20},
  {id:'s10',icon:'📜',title:'Committed',desc:'10 sessions',check:c=>c.sessions>=10},
  {id:'s50',icon:'🛡',title:'Veteran',desc:'50 sessions',check:c=>c.sessions>=50},
  {id:'s100',icon:'⚜',title:'Legend',desc:'100 sessions',check:c=>c.sessions>=100},
  {id:'h10',icon:'⏳',title:'Ten Hours',desc:'10 hours practice',check:c=>c.minutes>=600},
  {id:'h50',icon:'💪',title:'Dedicated',desc:'50 hours practice',check:c=>c.minutes>=3000},
  {id:'h100',icon:'🏆',title:'Century',desc:'100 hours practice',check:c=>c.minutes>=6000},
  {id:'m3',icon:'🧪',title:'Explorer',desc:'Try 3 methods',check:c=>c.methods.length>=3},
  {id:'m5',icon:'🔬',title:'Methodical',desc:'Try 5 methods',check:c=>c.methods.length>=5},
  {id:'lv5',icon:'⭐',title:'Halfway There',desc:'Reach Level 5',check:c=>getLv(c.xp)>=5},
  {id:'lv10',icon:'🌈',title:'The Restored',desc:'Complete the journey',check:c=>getLv(c.xp)>=10}
];

// ── STATE ──────────────────────────────────────────────────────────────────
let profiles=[], currentPid=null;
let char={xp:0,sessions:0,minutes:0,streak:0,lastDate:null,methods:[],achievements:[],name:'Restorer',dailyGoalMin:120,goalDays:0};
let logs=[];
let tab='today';
let selCat=null,selMethod='',dur=30,notes='';
let timerMode='manual',timerRunning=false,timerSecs=0,timerInterval=null;
let activeTimer=null;
let showProfileScreen=false;

// ── HELPERS ─────────────────────────────────────────────────────────────────
const getLv=xp=>{for(let i=XP_TABLE.length-1;i>=0;i--)if(xp>=XP_TABLE[i])return i;return 0};
const getProg=xp=>{const lv=getLv(xp);if(lv>=10)return{cur:0,need:0,pct:100};const s=XP_TABLE[lv],e=XP_TABLE[lv+1];return{cur:xp-s,need:e-s,pct:Math.round(((xp-s)/(e-s))*100)}};
const fmtSecs=s=>{const m=Math.floor(s/60),sec=s%60;return String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0')};
const fmtMin=m=>{if(m<60)return m+'m';const h=Math.floor(m/60),rm=m%60;return rm?`${h}h ${rm}m`:`${h}h`};
const today=()=>new Date().toISOString().split('T')[0];
const todayLogs=()=>logs.filter(l=>l.date===today());
const todayMin=()=>todayLogs().reduce((a,l)=>a+l.dur,0);
const thisWeekDays=()=>{const days=[];for(let i=6;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);days.push(d.toISOString().split('T')[0]);}return days;};
const weekdayLabels=()=>thisWeekDays().map(d=>{const day=new Date(d).getDay();return['Su','Mo','Tu','We','Th','Fr','Sa'][day]});
const weekDayMins=()=>thisWeekDays().map(d=>logs.filter(l=>l.date===d).reduce((a,l)=>a+l.dur,0));

// ── STORAGE (localStorage for downloaded file) ────────────────────────────
const LS={
  get(k){try{const v=localStorage.getItem(k);return v?{value:v}:null;}catch{return null;}},
  set(k,v){try{localStorage.setItem(k,v);}catch{}},
  delete(k){try{localStorage.removeItem(k);}catch{}}
};

async function loadAll(){
  const r=LS.get('rst-profiles');if(r)profiles=JSON.parse(r.value);
  const rp=LS.get('rst-active-pid');if(rp)currentPid=rp.value;
  if(currentPid&&profiles.find(p=>p.id===currentPid)){
    loadProfile(currentPid);
  } else if(profiles.length>0){
    currentPid=profiles[0].id;
    loadProfile(currentPid);
    LS.set('rst-active-pid',currentPid);
  } else {
    showProfileScreen=true;
  }
}
function loadProfile(pid){
  char={xp:0,sessions:0,minutes:0,streak:0,lastDate:null,methods:[],achievements:[],name:'Restorer',dailyGoalMin:120,goalDays:0};
  logs=[];
  const r=LS.get(`rst-${pid}-char`);if(r)char={...char,...JSON.parse(r.value)};
  const s=LS.get(`rst-${pid}-sessions`);if(s)logs=JSON.parse(s.value);
  // background timer
  const t=LS.get(`rst-${pid}-timer`);
  if(t){
    activeTimer=JSON.parse(t.value);
    if(activeTimer&&activeTimer.startedAt){
      const elapsed=Math.floor((Date.now()-activeTimer.startedAt)/1000);
      timerSecs=elapsed;timerRunning=true;timerMode='live';
      selCat=activeTimer.cat;selMethod=activeTimer.method;notes=activeTimer.notes||'';
      startTimerInterval();
    }
  }
}
function saveChar(){if(!currentPid)return;LS.set(`rst-${currentPid}-char`,JSON.stringify(char));}
function saveLogs(){if(!currentPid)return;LS.set(`rst-${currentPid}-sessions`,JSON.stringify(logs));}
function saveTimer(data){if(!currentPid)return;data?LS.set(`rst-${currentPid}-timer`,JSON.stringify(data)):LS.delete(`rst-${currentPid}-timer`);}
function saveProfiles(){LS.set('rst-profiles',JSON.stringify(profiles));}

// ── PROFILES ────────────────────────────────────────────────────────────────
function createProfile(name){
  const id='p'+Date.now();
  profiles.push({id,name,createdAt:today()});
  saveProfiles();
  currentPid=id;
  char={xp:0,sessions:0,minutes:0,streak:0,lastDate:null,methods:[],achievements:[],name,dailyGoalMin:120,goalDays:0};
  logs=[];
  LS.set('rst-active-pid',id);
  saveChar();
  showProfileScreen=false;tab='today';render();
}
function switchProfile(pid){
  currentPid=pid;
  char={xp:0,sessions:0,minutes:0,streak:0,lastDate:null,methods:[],achievements:[],name:'Restorer',dailyGoalMin:120,goalDays:0};
  logs=[];timerRunning=false;timerSecs=0;selCat=null;selMethod='';activeTimer=null;
  clearInterval(timerInterval);timerInterval=null;
  loadProfile(pid);
  LS.set('rst-active-pid',pid);
  showProfileScreen=false;tab='today';render();
}

// ── TIMER ────────────────────────────────────────────────────────────────────
function startTimerInterval(){
  if(timerInterval)clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    timerSecs++;
    const el=document.getElementById('live-clock');if(el)el.textContent=fmtSecs(timerSecs);
    const xpEl=document.getElementById('live-xp');
    if(xpEl){const cat=CATS.find(c=>c.id===selCat);xpEl.textContent='+'+(Math.round((timerSecs/60)*(cat?.mult||1)))+' XP';}
    const bannerEl=document.getElementById('live-banner-time');if(bannerEl)bannerEl.textContent=fmtSecs(timerSecs);
  },1000);
}
function startTimer(){
  if(timerRunning)return;
  timerRunning=true;
  if(!activeTimer||!activeTimer.startedAt){
    activeTimer={startedAt:Date.now()-timerSecs*1000,method:selMethod,cat:selCat,notes};
    saveTimer(activeTimer);
  }
  startTimerInterval();render();
}
function stopTimer(){
  if(!timerRunning)return;
  clearInterval(timerInterval);timerInterval=null;timerRunning=false;
  dur=Math.max(1,Math.round(timerSecs/60));render();
}
function resetTimer(){
  clearInterval(timerInterval);timerInterval=null;timerRunning=false;timerSecs=0;dur=30;
  activeTimer=null;saveTimer(null);render();
}

// ── LOG SESSION ──────────────────────────────────────────────────────────────
function doLogSession(){
  if(!selMethod)return;
  const finalDur=timerMode==='live'?Math.max(1,Math.round(timerSecs/60)):dur;
  if(finalDur<=0)return;
  const cat=CATS.find(c=>c.id===selCat);
  const mult=cat?cat.mult:1.0;
  const xp=Math.round(finalDur*mult);
  const td=today();
  let newStreak=char.streak;
  if(char.lastDate){const diff=Math.round((new Date(td)-new Date(char.lastDate))/86400000);if(diff===1)newStreak++;else if(diff>1)newStreak=1;}else newStreak=1;
  const prevTodayMin=todayMin();
  const newMethods=char.methods.includes(selMethod)?char.methods:[...char.methods,selMethod];
  let newGoalDays=char.goalDays;
  const dailyGoal=char.dailyGoalMin||120;
  if(prevTodayMin<dailyGoal&&(prevTodayMin+finalDur)>=dailyGoal)newGoalDays++;
  char={...char,xp:char.xp+xp,sessions:char.sessions+1,minutes:char.minutes+finalDur,streak:newStreak,lastDate:td,methods:newMethods,goalDays:newGoalDays};
  const newly=[];
  for(const a of ACHS)if(!char.achievements.includes(a.id)&&a.check(char)){char.achievements=[...char.achievements,a.id];newly.push(a.title);}
  logs=[{id:Date.now(),date:td,method:selMethod,cat:selCat,dur:finalDur,notes,xp},...logs];
  saveChar();saveLogs();
  clearInterval(timerInterval);timerInterval=null;
  selCat=null;selMethod='';dur=30;notes='';timerSecs=0;timerRunning=false;timerMode='manual';activeTimer=null;
  saveTimer(null);
  let msg=`+${xp} XP earned!`;
  if(newly.length)msg+=`\n🏆 ${newly[0]}`;
  showNotif(msg);tab='today';render();
}

// ── NOTIFY ───────────────────────────────────────────────────────────────────
function showNotif(msg){
  const el=document.getElementById('notif');el.textContent=msg;el.style.display='block';
  clearTimeout(el._t);el._t=setTimeout(()=>el.style.display='none',3500);
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function render(){
  if(showProfileScreen){renderProfileScreen();return;}
  const app=document.getElementById('root');
  app.innerHTML=`<div class="app">
    <div class="hdr">
      <div class="hdr-left">
        <div class="hdr-title">⚔ FORESKIN RPG</div>
        <div class="lv-pill" id="lv-pill">LV 0</div>
      </div>
      <button class="profile-btn" id="profile-btn">👤 ${char.name} ▾</button>
    </div>
    <div class="content" id="content"></div>
    ${renderNav()}
  </div>`;
  document.getElementById('lv-pill').textContent='LV '+getLv(char.xp);
  document.getElementById('profile-btn').addEventListener('click',()=>{showProfileScreen=true;render();});
  const c=document.getElementById('content');
  if(tab==='today')c.innerHTML=renderToday();
  else if(tab==='char')c.innerHTML=renderChar();
  else if(tab==='log')c.innerHTML=renderLog();
  else if(tab==='reports')c.innerHTML=renderReports();
  else if(tab==='ach')c.innerHTML=renderAch();
  attachEvents();
}

function renderNav(){
  const tabs=[{id:'today',icon:'☀',lbl:'Today'},{id:'char',icon:'⚔',lbl:'Character'},{id:'log',icon:'+',lbl:'Log'},{id:'reports',icon:'◉',lbl:'Reports'},{id:'ach',icon:'★',lbl:'Feats'}];

      <div class="hist-icon" style="background:${cat.color}18;border:1px solid ${cat.color}33">${cat.icon}</div>
      <div style="flex:1"><div style="font-weight:600;font-size:12px">${l.method}</div>
      <div style="font-size:10px;color:#555;margin-top:1px">${l.date} · ${fmtMin(l.dur)}${l.notes?` · ${l.notes.slice(0,30)}`:''}</div></div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:3px">
        <span style="color:#C9A84C;font-weight:700;font-size:12px">+${l.xp}</span>
        <button class="del-btn" data-id="${l.id}">✕</button>
      </div>
    </div>`;
  }).join(''):`<div class="empty">No sessions yet.</div>`}`;
}

function renderAch(){
  const cards=ACHS.map(a=>{const u=char.achievements.includes(a.id);
    return`<div class="ach-card ${u?'unlocked':'locked'}">
      <div style="font-size:24px;margin-bottom:5px">${a.icon}</div>
      <div style="font-size:11px;font-weight:600;color:${u?'#C9A84C':'#2a2a2a'}">${a.title}</div>
      <div style="font-size:9px;color:#444;margin-top:2px">${a.desc}</div>
    </div>`;
  }).join('');
  return`<div class="page-title">Feats & Achievements</div>
  <div style="font-size:11px;color:#444;margin-bottom:12px">${char.achievements.length} / ${ACHS.length} unlocked</div>
  <div class="ach-grid">${cards}</div>`;
}

// ── EVENTS ───────────────────────────────────────────────────────────────────
function attachEvents(){
  document.querySelectorAll('.nav-btn').forEach(b=>b.addEventListener('click',()=>{tab=b.dataset.tab;render();}));
  const gi=document.getElementById('goal-input');
  if(gi)gi.addEventListener('change',()=>{char.dailyGoalMin=Math.max(5,Math.min(960,+gi.value||120));saveChar();render();});
  document.getElementById('live-banner-goto')?.addEventListener('click',()=>{tab='log';render();});
  document.getElementById('cat-grid')?.querySelectorAll('.cat-btn').forEach(b=>b.addEventListener('click',()=>{selCat=b.dataset.cat;selMethod='';render();}));
  document.querySelectorAll('.method-btn').forEach(b=>b.addEventListener('click',()=>{selMethod=b.dataset.method;render();}));
  document.querySelectorAll('.mode-btn').forEach(b=>b.addEventListener('click',()=>{
    const m=b.dataset.mode;if(!m||m===timerMode)return;
    if(timerRunning){clearInterval(timerInterval);timerInterval=null;timerRunning=false;}
    timerSecs=0;activeTimer=null;saveTimer(null);timerMode=m;dur=30;render();
  }));
  document.getElementById('btn-start')?.addEventListener('click',startTimer);
  document.getElementById('btn-stop')?.addEventListener('click',stopTimer);
  document.getElementById('btn-resume')?.addEventListener('click',startTimer);
  document.getElementById('btn-reset')?.addEventListener('click',resetTimer);
  const sl=document.getElementById('dur-slider');
  if(sl)sl.addEventListener('input',()=>{dur=+sl.value;document.getElementById('dur-display').textContent=dur+' min';const cat=CATS.find(c=>c.id===selCat);document.getElementById('xp-prev').textContent='+'+(Math.round(dur*(cat?.mult||1)))+' XP';});
  document.querySelectorAll('.quick-btn').forEach(b=>b.addEventListener('click',()=>{dur=+b.dataset.dur;render();}));
  const ta=document.getElementById('notes-ta');if(ta)ta.addEventListener('input',()=>notes=ta.value);
  document.getElementById('log-btn')?.addEventListener('click',doLogSession);
  document.querySelectorAll('.del-btn').forEach(b=>b.addEventListener('click',e=>{
    e.stopPropagation();const id=+b.dataset.id;const entry=logs.find(l=>l.id===id);
    if(entry){char.xp=Math.max(0,char.xp-entry.xp);char.sessions=Math.max(0,char.sessions-1);char.minutes=Math.max(0,char.minutes-entry.dur);}
    logs=logs.filter(l=>l.id!==id);saveChar();saveLogs();render();
  }));
}

// ── INIT ─────────────────────────────────────────────────────────────────────
loadAll();render();
</script>
</body>
</html>
